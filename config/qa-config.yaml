# QA Pipeline Configuration File
# This file specifies directory paths for the tSNR quality assurance pipeline

# Directories configuration
directories:
  # Base data directory (relative to project root)
  data_dir: "data"
  
  # Derivatives directory within data_dir  
  derivatives_dir: "derivatives"
  
  # Input derivative directory (e.g., fmriprep, fmriprep-lts)
  input_derivative: "fmriprep"
  
  # Output derivative directory
  output_derivative: "qa"
  
  # Subdirectory within output derivative for tSNR results
  output_subdir: "tsnr"