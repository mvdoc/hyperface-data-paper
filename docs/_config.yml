title: "Hyperface fMRI Dataset: Quality Assurance Report"
author: "Matteo Visconti di Oleggio Castello, Jiahui Guo"
copyright: "2025"
logo: ""

execute:
  execute_notebooks: "off"  # Don't execute notebooks during build
  allow_errors: true
  timeout: 300

# Define the name of the LaTeX output file for PDF builds
latex:
  latex_documents:
    targetname: hyperface-qa-report.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Information about where the book exists on the web
repository:
  url: https://github.com/mvdoc/hyperface-data-paper  
  path_to_book: docs
  branch: master

# Add GitHub buttons to your book
html:
  use_issues_button: true
  use_repository_button: true
  use_edit_page_button: true
  
# Sphinx configuration
sphinx:
  config:
    html_theme_options:
      repository_url: "https://github.com/mvdoc/hyperface-data-paper"
      use_repository_button: true